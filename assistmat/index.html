<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASSIST'Mat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
    }

    p {
      color: #4b5563;
      margin-bottom: 24px;
    }

    .btn {
      display: block;
      text-decoration: none;
      background: #6366f1;
      color: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .btn.secondary {
      background: #0f172a;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <h1>ASSIST'Mat</h1>
      <p>Gestion des enfants, contrats et suivi quotidien.</p>

      <a class="btn" href="#">Accéder à mes enfants</a>
      <a class="btn secondary" href="#">Créer une fiche enfant</a>

      <a href="/" style="display:block;margin-top:20px;">← Retour accueil</a>

    </div>
  </div>

</body>
</html>
