<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASSIST'Mat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 24px;
      color: #4b5563;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-decoration: none;
      background: #6366f1;
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 14px;
      font-weight: bold;
      font-size: 1rem;
    }

    .btn.secondary {
      background: #0f172a;
    }

    .footer {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>ASSIST'Mat</h1>
      <p>Plateforme d’outils pour les Assistants Maternels.</p>

      <a class="btn" href="/assistmat/">Ouvrir ASSIST'Mat</a>
      <a class="btn secondary" href="/simulateur/">Ouvrir le Simulateur</a>

      <div class="footer">Version de démarrage en ligne</div>
    </div>
  </div>
</body>
</html>
