<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assist'Mat</title>

  <style>
    :root{
      --bg:#f7f4ef;
      --card:#ffffff;
      --soft:#faf8f4;
      --text:#3f372f;
      --muted:#6c645c;
      --line:#d6cfc5;
      --line-strong:#c9c0b4;
      --accent-soft:#f1eee8;
      --shadow:0 10px 24px rgba(0,0,0,.08);
      --radius:20px;
      --urgence:#d62828;
      --urgence-dark:#b71c1c;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app-masthead{
      padding:12px 16px 6px;
      text-align:center;
    }

    .app-title{
      font-size:1.2rem;
      font-weight:800;
    }

    .app-version{
      font-size:.85rem;
      color:var(--muted);
      font-weight:700;
    }

    .app-credit{
      font-size:.75rem;
      color:var(--muted);
    }

    .wrapper{
      max-width:720px;
      margin:0 auto;
      padding:10px 14px 28px;
    }

    .home-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .home-head{
      padding:16px;
      border-bottom:1px solid var(--line);
      background:#f7f4ef;
    }

    .home-head h1{
      margin:0;
      font-size:1.05rem;
    }

    .home-head p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:.95rem;
    }

    .home-body{
      padding:16px;
      display:grid;
      gap:12px;
      background:var(--soft);
    }

    .tool-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
    }

    .tool-card h2{
      margin:0 0 6px;
      font-size:1rem;
    }

    .tool-card p{
      margin:0 0 12px;
      color:var(--muted);
      font-size:.92rem;
    }

    .btn{
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      min-height:46px;
      padding:10px;
      border-radius:14px;
      border:1.5px solid var(--line-strong);
      background:var(--accent-soft);
      color:var(--text);
      text-decoration:none;
      font-weight:700;
      box-shadow:
        0 2px 0 rgba(0,0,0,.06),
        0 1px 0 rgba(255,255,255,.8) inset;
    }

    .btn-primary{
      background:#ffffff;
      border:2px solid var(--line-strong);
      font-weight:800;
    }

    .home-footer{
      padding:14px;
      text-align:center;
      color:var(--muted);
      font-size:.82rem;
      background:#fff;
      border-top:1px solid var(--line);
    }

    .btn-urgence-home{
      position:fixed;
      right:20px;
      bottom:20px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:14px 18px;
      border-radius:999px;
      background:var(--urgence);
      color:#fff;
      text-decoration:none;
      font-weight:800;
      box-shadow:0 8px 20px rgba(0,0,0,.28);
      z-index:9999;
    }

    .btn-urgence-cross{
      width:32px;
      height:32px;
      border-radius:50%;
      background:#fff;
      color:var(--urgence);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:900;
    }
  </style>
</head>

<body>

  <div class="app-masthead">
    <div class="app-title">Assist'Mat</div>
    <div class="app-version">Plateforme d’outils</div>
    <div class="app-credit">Thierry Bigorne</div>
  </div>

  <div class="wrapper">
    <div class="home-card">

      <div class="home-head">
        <h1>Choisissez l’outil à ouvrir</h1>
        <p>Point d’entrée vers les outils Assist'Mat.</p>
      </div>

      <div class="home-body">

        <div class="tool-card">
          <h2>Assist'Mat</h2>
          <p>Gestion des enfants et suivi.</p>
          <a class="btn btn-primary" href="/assistmat/">Ouvrir</a>
        </div>

        <div class="tool-card">
          <h2>Simulateur</h2>
          <p>Simulation de mensualisation.</p>
          <a class="btn" href="/simulateur/">Ouvrir</a>
        </div>

      </div>

      <div class="home-footer">
        Version Vercel
      </div>

    </div>
  </div>

  <a href="/urgence/" class="btn-urgence-home">
    <span class="btn-urgence-cross">✚</span>
    Urgence
  </a>

</body>
</html>
