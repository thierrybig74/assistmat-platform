<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssistMat Platform</title>
<style>
:root {
  --bg: #f4f1ec;
  --card: #ffffff;
  --border: #e2ddd5;
  --text: #1a1714;
  --text2: #666666;
  --accent: #2b5c8a;
  --radius: 16px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  text-align: center;
  padding: 20px;
  width: 100%;
  max-width: 420px;
}
h1 {
  margin: 0;
  font-size: 1.6rem;
  font-weight: 700;
}
.subtitle {
  margin-top: 6px;
  color: var(--text2);
  font-size: 0.9rem;
  margin-bottom: 28px;
}
.card {
  display: block;
  padding: 18px;
  margin: 12px 0;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--border);
  text-decoration: none;
  color: var(--text);
  transition: all 0.15s ease;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
.card-title {
  font-size: 1.05rem;
  font-weight: 600;
}
.card-sub {
  margin-top: 4px;
  font-size: 0.8rem;
  color: var(--text2);
}
.footer {
  margin-top: 24px;
  font-size: 0.75rem;
  color: var(--text2);
}
</style>
</head>
<body>
  <div class="container">
    <h1>AssistMat</h1>
    <div class="subtitle">Outils assistants maternels</div>

    <a href="/assistmat/" class="card">
      <div class="card-title">ASSIST'Mat</div>
      <div class="card-sub">Outil principal</div>
    </a>

    <a href="/simulateur/" class="card">
      <div class="card-title">ASSIST'Mat Simulateur</div>
      <div class="card-sub">Simulations et mensualisation</div>
    </a>

    <div class="footer">Plateforme web</div>
  </div>
</body>
</html>
